<div class="flex flex-col h-dvh w-full bg-dark text-zinc-200">
   
  <header class="flex items-center justify-between border-b border-white/10 shrink-0 px-6 py-4 sm:py-2">
    
    <div class="flex items-center justify-between gap-2 md:gap-4 overflow-hidden w-full sm:w-max">
        <span class="rounded-full size-6 bg-transparent border-4 border-primary flex items-center justify-center shrink-0">
          <span class="rounded-full bg-primary size-2"></span>
        </span>

        <span class="h-4 w-px bg-gray-200/20 rotate-20 hidden sm:block"></span>

        <div class="flex gap-2 items-center hidden md:flex">
            <svg class="stroke-gray-200/40" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="20" height="20" color="#4a4a4a" fill="none" stroke="#4a4a4a" stroke-width="1.5">
              <path d="M15 5C15 6.65685 13.2418 8.5 12 8.5C10.7582 8.5 9 6.65685 9 5C9 3.34315 10.3431 2 12 2C13.6569 2 15 3.34315 15 5Z" />
              <path d="M16.0415 9C17.5645 10.3353 18.5514 12.5969 17.6652 14.7052C17.4742 15.1594 17.0361 15.4539 16.5514 15.4539C16.0585 15.4539 15.249 15.296 15.0917 15.9374L13.9945 20.4123C13.7657 21.3454 12.9434 22 12.0001 22C11.0567 22 10.2344 21.3454 10.0056 20.4123L8.90839 15.9374C8.7511 15.296 7.94155 15.4539 7.44868 15.4539C6.96396 15.4539 6.52588 15.1594 6.33494 14.7052C5.44873 12.5969 6.43564 10.3353 7.95863 9" />
            </svg>
            <div class="first-letter:uppercase text-sm truncate max-w-[80px]">{{ userName() }}</div>
        </div>

        <span class="h-4 w-px bg-gray-200/20 rotate-20 hidden md:block"></span>

        <div class="flex items-center gap-2 text-zinc-400 text-sm font-medium">
          <svg class="stroke-gray-200/40 hidden sm:block" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="20" height="20" color="#4a4a4a" fill="none" stroke="#4a4a4a" stroke-width="1.5">
              <path d="M17 16V8C17 5.64298 17 4.46447 16.2678 3.73223C15.5355 3 14.357 3 12 3H8C5.64298 3 4.46447 3 3.73223 3.73223C3 4.46447 3 5.64298 3 8V16C3 18.357 3 19.5355 3.73223 20.2678C4.46447 21 5.64298 21 8 21H12C14.357 21 15.5355 21 16.2678 20.2678C17 19.5355 17 18.357 17 16Z" />
              <path d="M11 21H17C18.8856 21 19.8284 21 20.4142 20.4142C21 19.8284 21 18.8856 21 17V10C21 8.11438 21 7.17157 20.4142 6.58579C19.8284 6 18.8856 6 17 6" />
              <path d="M13 11V13" />
          </svg>
          <span class="text-zinc-200 select-text text-xs sm:text-sm truncate max-w-[60px] sm:max-w-none">{{ roomId() }}</span>
        </div>

        <div class="flex items-center gap-2 text-zinc-400 text-sm">
          <svg class="stroke-gray-200/40 hidden sm:block" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="20" height="20" color="#4a4a4a" fill="none" stroke="#4a4a4a" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
              <path d="M12 22C6.47714 22 2.00003 17.5228 2.00003 12C2.00003 6.47715 6.47718 2 12 2C16.4777 2 20.2257 4.94289 21.5 9H19" />
              <path d="M12 8V12L14 14" />
              <path d="M21.9551 13C21.9848 12.6709 22 12.3373 22 12M15 22C15.3416 21.8876 15.6753 21.7564 16 21.6078M20.7906 17C20.9835 16.6284 21.1555 16.2433 21.305 15.8462M18.1925 20.2292C18.5369 19.9441 18.5369 19.9441 18.5369 19.9441" />
          </svg>
          <span class="text-zinc-200 text-xs sm:text-sm">{{ duration() }}</span>
        </div>
    </div>


    <div class=" fixed bottom-0 left-0 w-full z-20 p-2 md:relative sm:w-max sm:p-0">
      <div class="w-full flex items-center justify-between gap-1 sm:gap-2 bg-zinc-900/50 backdrop-blur-md rounded-full border border-zinc-700 p-3 sm:justify-start sm:bg-transparent sm:border-none sm:p-0">
        <button 
          (click)="toggleMic()"
          class="size-12 sm:size-10 rounded-full flex items-center justify-center transition-all duration-200 border text-zinc-200 bg-[#1e1e1e] border-white/5 hover:bg-zinc-800 hover:border-white/10 cursor-pointer">
          @if (isMicMuted()) {
              <svg class="stroke-gray-200 w-5" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="20" height="20" color="#4a4a4a" fill="none" stroke="#4a4a4a" stroke-width="1.5" stroke-linecap="round">
                  <path d="M2 2L22 22" />
                  <path d="M4 11C4 15.4183 7.58172 19 12 19M12 19C13.9545 19 15.7454 18.2991 17.1348 17.1348M12 19V22M12 22H15M12 22H9M20 11C20 12.6514 19.4996 14.1859 18.6422 15.4603" />
                  <path d="M7 6.98V11C7 13.7614 9.23858 16 12 16C13.1354 16 14.1647 15.6096 15.004 14.972M16.4387 13.244C16.7973 12.5545 17 11.8309 17 11V6.98C17 4.21858 14.7614 2 12 2C10.1312 2 8.53009 2.96527 7.672 4.484" />
              </svg>
            } @else {
              <svg class="stroke-primary w-5" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="20" height="20" color="#4a4a4a" fill="none" stroke="#4a4a4a" stroke-width="1.5">
                  <path d="M17 7V11C17 13.7614 14.7614 16 12 16C9.23858 16 7 13.7614 7 11V7C7 4.23858 9.23858 2 12 2C14.7614 2 17 4.23858 17 7Z" />
                  <path d="M20 11C20 15.4183 16.4183 19 12 19M12 19C7.58172 19 4 15.4183 4 11M12 19V22M12 22H15M12 22H9" />
              </svg>
            }
        </button>

        <button 
          (click)="toggleCamera()"
          class="size-12 sm:size-10 rounded-full flex items-center justify-center transition-all duration-200 border text-zinc-200 bg-[#1e1e1e] border-white/5 hover:bg-zinc-800 hover:border-white/10 cursor-pointer">
         @if (isCameraOff()) {
              <svg class="stroke-gray-200 w-5" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="20" height="20" color="#4a4a4a" fill="none" stroke="#4a4a4a" stroke-width="1.5" stroke-linecap="round">
                    <path d="M2.00189 1.99988L21.9772 21.9999" />
                    <path d="M16.8516 16.8677C16.7224 17.8061 16.4665 18.4668 15.9595 18.9744C14.9356 19.9996 13.2877 19.9996 9.992 19.9996H8.99323C5.69749 19.9996 4.04961 19.9996 3.02575 18.9744C2.00189 17.9493 2.00189 16.2994 2.00189 12.9996V10.9996C2.00189 7.69971 2.00189 6.04979 3.02575 5.02466C3.36827 4.68172 3.78062 4.45351 4.30114 4.30164" />
                    <path d="M8.23627 4.0004C8.47815 3.99988 8.72995 3.99988 8.99217 3.99988H9.99093C13.2867 3.99988 14.9346 3.99988 15.9584 5.02501C16.9822 6.05013 16.9822 7.70005 16.9822 10.9999V12.7573M16.9822 9.2313L19.3018 7.52901C20.7729 6.54061 21.4489 7.17184 21.6674 7.64835C22.1191 8.92801 21.9768 11.3935 21.9768 14.5416C21.8703 16.5549 21.5952 16.7718 21.3137 16.9938L21.3107 16.9961" />
                </svg>
            } @else {
                <svg class="stroke-primary w-5" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="20" height="20" color="#4a4a4a" fill="none" stroke="#4a4a4a" stroke-width="1.5">
                    <path d="M2 11C2 7.70017 2 6.05025 3.02513 5.02513C4.05025 4 5.70017 4 9 4H10C13.2998 4 14.9497 4 15.9749 5.02513C17 6.05025 17 7.70017 17 11V13C17 16.2998 17 17.9497 15.9749 18.9749C14.9497 20 13.2998 20 10 20H9C5.70017 20 4.05025 20 3.02513 18.9749C2 17.9497 2 16.2998 2 13V11Z" />
                    <path d="M17 8.90585L17.1259 8.80196C19.2417 7.05623 20.2996 6.18336 21.1498 6.60482C22 7.02628 22 8.42355 22 11.2181V12.7819C22 15.5765 22 16.9737 21.1498 17.3952C20.2996 17.8166 19.2417 16.9438 17.1259 15.198L17 15.0941" />
                    <circle cx="11.5" cy="9.5" r="1.5" />
                </svg>
            }
        </button>

        <button class="size-12 sm:size-10 rounded-full flex items-center justify-center transition-all duration-200 border text-zinc-200 bg-[#1e1e1e] border-white/5 hover:bg-zinc-800 hover:border-white/10 cursor-pointer hidden sm:flex">
          <svg class="stroke-gray-200 w-4 h-4 sm:w-5 sm:h-5" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="20" height="20" color="#4a4a4a" fill="none" stroke="#4a4a4a" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
              <path d="M16 3H8C5.17157 3 3.75736 3 2.87868 3.87868C2 4.75736 2 6.17157 2 9V11C2 13.8284 2 15.2426 2.87868 16.1213C3.75736 17 5.17157 17 8 17H16C18.8284 17 20.2426 17 21.1213 16.1213C22 15.2426 22 13.8284 22 11V9C22 6.17157 22 4.75736 21.1213 3.87868C20.2426 3 18.8284 3 16 3Z" />
              <path d="M16 21C14.8233 20.364 13.4571 20 12 20C10.5429 20 9.17669 20.364 8 21" />
          </svg>
        </button>

        <div class="hidden md:block w-px h-6 bg-white/10 mx-0.5 sm:mx-1"></div>

        <button (click)="toggleMuteAll()" class="size-12 sm:size-10 rounded-full flex items-center justify-center transition-all duration-200 border text-zinc-200 bg-[#1e1e1e] border-white/5 hover:bg-zinc-800 hover:border-white/10 cursor-pointer">
            <svg class="stroke-gray-200 w-4 h-4 sm:w-5 sm:h-5" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="20" height="20" color="#4a4a4a" fill="none" stroke="#4a4a4a" stroke-width="1.5" stroke-linecap="round">
                <path d="M2 2L22 22" />
                <path d="M4 11C4 15.4183 7.58172 19 12 19M12 19C13.9545 19 15.7454 18.2991 17.1348 17.1348M12 19V22M12 22H15M12 22H9M20 11C20 12.6514 19.4996 14.1859 18.6422 15.4603" />
                <path d="M7 6.98V11C7 13.7614 9.23858 16 12 16C13.1354 16 14.1647 15.6096 15.004 14.972M16.4387 13.244C16.7973 12.5545 17 11.8309 17 11V6.98C17 4.21858 14.7614 2 12 2C10.1312 2 8.53009 2.96527 7.672 4.484" />
            </svg>
        </button>
        
        <div class="relative">
          <button 
            (click)="toggleResolutionMenu()"
            class="size-12 sm:size-10 rounded-full flex items-center justify-center transition-all duration-200 border text-zinc-200 bg-[#1e1e1e] border-white/5 hover:bg-zinc-800 hover:border-white/10 cursor-pointer">
            <svg class="stroke-gray-200 w-4 h-4 sm:w-5 sm:h-5" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="20" height="20" color="#4a4a4a" fill="none" stroke="#4a4a4a" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
              <path d="M2 12C2 7.28595 2 4.92893 3.46447 3.46447C4.92893 2 7.28595 2 12 2C16.714 2 19.0711 2 20.5355 3.46447C22 4.92893 22 7.28595 22 12C22 16.714 22 19.0711 20.5355 20.5355C19.0711 22 16.714 22 12 22C7.28595 22 4.92893 22 3.46447 20.5355C2 19.0711 2 16.714 2 12Z" />
              <path d="M7 10V14M7 12H11M11 10V14" />
              <path d="M14 10H15.5C16.3284 10 17 10.6716 17 11.5V12.5C17 13.3284 16.3284 14 15.5 14H14V10Z" />
            </svg>
          </button>

          @if (isResolutionMenuOpen()) {
            <div class="fixed inset-0 z-40" (click)="isResolutionMenuOpen.set(false)"></div>
            <div class="absolute right-0 top-10 sm:top-12 mt-2 w-28 sm:w-32 bg-[#1e1e1e] border border-white/10 rounded-lg shadow-xl py-1 z-50">
              <button (click)="setResolution('High')" class="w-full text-left px-3 sm:px-4 py-1.5 sm:py-2 text-xs sm:text-sm transition-colors" [ngClass]="currentResolution() === 'High' ? 'text-emerald-400 bg-emerald-400/10' : 'text-zinc-300 hover:bg-white/5 hover:text-white'">High</button>
              <button (click)="setResolution('Medium')" class="w-full text-left px-3 sm:px-4 py-1.5 sm:py-2 text-xs sm:text-sm transition-colors" [ngClass]="currentResolution() === 'Medium' ? 'text-emerald-400 bg-emerald-400/10' : 'text-zinc-300 hover:bg-white/5 hover:text-white'">Medium</button>
              <button (click)="setResolution('Low')" class="w-full text-left px-3 sm:px-4 py-1.5 sm:py-2 text-xs sm:text-sm transition-colors" [ngClass]="currentResolution() === 'Low' ? 'text-emerald-400 bg-emerald-400/10' : 'text-zinc-300 hover:bg-white/5 hover:text-white'">Low</button>
            </div>
          }
        </div>

        <div class="hidden md:block w-px h-6 bg-white/10 mx-0.5 sm:mx-1"></div>

        <button 
          (click)="leave()"
          class="size-12 sm:size-10 rounded-full flex items-center justify-center transition-all duration-200 border bg-red-500 text-white border-none outline-none hover:bg-red-600 cursor-pointer">
          <i class="pi pi-phone text-xs sm:text-base" style="transform: rotate(135deg);"></i>
        </button>
      </div>
    </div>
  </header>

  <main class="flex-1 p-3 sm:p-6 overflow-y-auto relative">
    <div class="absolute inset-0 opacity-[0.03] pointer-events-none" style="background-image: radial-gradient(#ffffff 1px, transparent 1px); background-size: 24px 24px;"></div>
    
    <div class="h-full w-full sm:w-[90%] mx-auto grid gap-2 sm:gap-3 relative z-10" [ngStyle]="gridStyle()">
      @for (p of participants(); track p.id) {
        <app-user 
          class="h-full w-full block"
          [isCurrentUser]="p.id === myId()"
          [name]="p.name" 
          [isMuted]="p.isMuted"
          [isCamOff]="p.isCamOff"
          [initials]="p.initials"
          [stream]="p.stream" />
      }
    </div>
  </main>

  @if (!isJoined()) {
      <div class="fixed inset-0 z-[100] bg-dark/80 backdrop-blur-xl flex flex-col items-center justify-center transition-all duration-500">
          <div class="relative">
            <!-- Outer Glow -->
            <div class="absolute inset-0 bg-primary/20 blur-3xl rounded-full scale-150 animate-pulse"></div>
            
            <!-- Spinner -->
            <div class="relative size-24 border-4 border-white/5 border-t-primary rounded-full animate-spin shadow-[0_0_20px_rgba(var(--color-primary),0.3)]"></div>
            
            <!-- Center Icon/Logo -->
            <div class="absolute inset-0 flex items-center justify-center">
                <span class="rounded-full size-6 bg-transparent border-4 border-primary flex items-center justify-center shrink-0">
                  <span class="rounded-full bg-primary size-2"></span>
                </span>
            </div>
          </div>
        
          <div class="mt-8 text-center space-y-2 animate-in fade-in slide-in-from-bottom-4 duration-700">
            <h2 class="text-2xl font-bold text-white tracking-tight">Joining Room</h2>
            <p class="text-zinc-400 text-sm font-medium tracking-wide">Please wait...</p>
          </div>
      </div>
  }

</div>
