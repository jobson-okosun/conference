<div class="relative w-full h-full bg-dark-lighter/50 rounded-xl overflow-hidden flex items-center justify-center group transition-all duration-300 border border-transparent hover:border-zinc-700">
    
    <video 
        #videoPlayer 
        autoplay 
        playsinline 
        [class.hidden]="isCamOff()"
        [class.scale-x-[-1]]="isCurrentUser()"
        class="absolute inset-0 w-full h-full object-cover">
    </video>

    <div 
        [class.hidden]="!isCamOff() && stream()"
        [class.bg-emerald-800!]="isCurrentUser()" 
        [class.ring-emerald-600!]="isCurrentUser()" 
        [class.ring-0!]="isCurrentUser()" 
        [class.text-white/80!]="isCurrentUser()"
        class="size-12 sm:size-20 rounded-full bg-zinc-800 flex items-center justify-center text-xl sm:text-3xl text-zinc-400 font-medium ring-2 ring-zinc-700 shadow-inner z-0"
    >{{ initials() }}</div>

    <div class="absolute bottom-2 left-2 sm:bottom-3 sm:left-3 flex items-center gap-1.5 sm:gap-2 bg-dark-darker/60 backdrop-blur-md px-2 py-1 sm:px-3 sm:py-1.5 rounded-lg border border-white/10 z-10">
        
        <div class="flex items-center justify-center">
        @if (isMuted()) {
            <svg class="stroke-gray-200 w-3.5 h-3.5 sm:w-[18px] sm:h-[18px]" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="18" height="18" color="#4a4a4a" fill="none" stroke="#4a4a4a" stroke-width="1.5" stroke-linecap="round">
                <path d="M2 2L22 22" />
                <path d="M4 11C4 15.4183 7.58172 19 12 19M12 19C13.9545 19 15.7454 18.2991 17.1348 17.1348M12 19V22M12 22H15M12 22H9M20 11C20 12.6514 19.4996 14.1859 18.6422 15.4603" />
                <path d="M7 6.98V11C7 13.7614 9.23858 16 12 16C13.1354 16 14.1647 15.6096 15.004 14.972M16.4387 13.244C16.7973 12.5545 17 11.8309 17 11V6.98C17 4.21858 14.7614 2 12 2C10.1312 2 8.53009 2.96527 7.672 4.484" />
            </svg>
        } @else {
            <i class="pi pi-microphone text-emerald-400 text-[10px] sm:text-xs"></i>
        }
        </div>

        <span class="text-[10px] sm:text-xs text-zinc-200 font-medium tracking-wide">{{ name() }}</span>
    </div>

    <!-- Resolution Switcher -->
    <div class="absolute top-2 right-2 sm:top-3 sm:right-3 opacity-0 group-hover:opacity-100 transition-opacity duration-200 z-20" [class.opacity-100]="isResolutionMenuOpen()">
        <button 
            (click)="toggleResolutionMenu()"
            class="size-7 sm:size-8 rounded-lg flex items-center justify-center bg-black/60 backdrop-blur-md border border-white/10 text-zinc-400 hover:text-white hover:bg-black/80 transition-all cursor-pointer">
            <svg class="stroke-current w-3.5 h-3.5 sm:w-4 sm:h-4" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M2 12C2 7.28595 2 4.92893 3.46447 3.46447C4.92893 2 7.28595 2 12 2C16.714 2 19.0711 2 20.5355 3.46447C22 4.92893 22 7.28595 22 12C22 16.714 22 19.0711 20.5355 20.5355C19.0711 22 16.714 22 12 22C7.28595 22 4.92893 22 3.46447 20.5355C2 19.0711 2 16.714 2 12Z" />
                <path d="M7 10V14M7 12H11M11 10V14" />
                <path d="M14 10H15.5C16.3284 10 17 10.6716 17 11.5V12.5C17 13.3284 16.3284 14 15.5 14H14V10Z" />
            </svg>
        </button>

        @if (isResolutionMenuOpen()) {
            <div class="fixed inset-0 z-40" (click)="isResolutionMenuOpen.set(false)"></div>
            <div class="absolute right-0 top-9 sm:top-10 w-24 sm:w-28 bg-dark-lighter border border-white/10 rounded-lg shadow-2xl py-1 z-50 overflow-hidden">
                <button (click)="setResolution('High')" class="w-full text-left px-3 py-1.5 text-[10px] sm:text-xs transition-colors" [ngClass]="currentResolution() === 'High' ? 'text-emerald-400 bg-emerald-400/10' : 'text-zinc-400 hover:bg-white/5 hover:text-white'">High</button>
                <button (click)="setResolution('Medium')" class="w-full text-left px-3 py-1.5 text-[10px] sm:text-xs transition-colors" [ngClass]="currentResolution() === 'Medium' ? 'text-emerald-400 bg-emerald-400/10' : 'text-zinc-400 hover:bg-white/5 hover:text-white'">Medium</button>
                <button (click)="setResolution('Low')" class="w-full text-left px-3 py-1.5 text-[10px] sm:text-xs transition-colors" [ngClass]="currentResolution() === 'Low' ? 'text-emerald-400 bg-emerald-400/10' : 'text-zinc-400 hover:bg-white/5 hover:text-white'">Low</button>
            </div>
        }
    </div>

</div>
