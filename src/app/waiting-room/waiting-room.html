<div class="min-h-dvh w-full bg-dark text-zinc-200 flex flex-col relative overflow-hidden">
    <div class="absolute inset-0 opacity-[0.03] pointer-events-none" style="background-image: radial-gradient(#ffffff 1px, transparent 1px); background-size: 32px 32px;"></div>

    <header class="p-6 sm:p-8">
        <div class="flex items-center gap-3">
            <span class="rounded-full size-8 bg-transparent border-4 border-primary flex items-center justify-center shrink-0">
                <span class="rounded-full bg-primary size-3"></span>
            </span>
            <h1 class="text-xl font-bold tracking-tight">Conference</h1>
        </div>
    </header>

    <main class="flex-1 flex items-center justify-center p-6 z-10">
        <div class="max-w-4xl w-full grid grid-cols-1 md:grid-cols-2 gap-12 items-stretch">
            <!-- Left Side: Video Preview -->
            <div class="relative bg-dark rounded-3xl border border-white/10 flex items-center justify-center overflow-hidden group min-h-[400px]">
                <video 
                    #previewVideo 
                    autoplay 
                    muted 
                    playsinline 
                    [class.hidden]="isCameraOff()"
                    class="absolute inset-0 w-full h-full object-cover scale-x-[-1]">
                </video>

                <div class="absolute inset-0 flex items-center justify-center" [class.hidden]="!isCameraOff() && localStream">
                    <div class="size-24 rounded-full bg-zinc-800 flex items-center justify-center text-4xl text-zinc-600 font-medium border border-zinc-700">
                        {{ userName() ? userName().charAt(0).toUpperCase() : '?' }}
                    </div>
                </div>

                @if (isCameraOff()) {
                    <div class="absolute inset-0 bg-black/60 backdrop-blur-sm flex items-center justify-center">
                        <span class="text-zinc-400 font-medium">Camera is off</span>
                    </div>
                }

                <div class="absolute top-6 left-6 space-y-1">
                    <p class="text-sm font-medium text-zinc-300">Ready to join?</p>
                    <p class="text-[10px] text-zinc-500 uppercase tracking-widest">ID: {{ roomId() }}</p>
                </div>

                <div class="absolute bottom-6 left-1/2 -translate-x-1/2 flex items-center gap-4">
                    <button 
                        (click)="toggleMic()"
                        class="size-12 rounded-full flex items-center justify-center transition-all duration-200 border bg-white/10 border-white/10 text-white hover:bg-white/20">
                        @if (isMicMuted()) {
                           <svg class="stroke-gray-200 w-5" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="20" height="20" color="#4a4a4a" fill="none" stroke="#4a4a4a" stroke-width="1.5" stroke-linecap="round">
                                <path d="M2 2L22 22" />
                                <path d="M4 11C4 15.4183 7.58172 19 12 19M12 19C13.9545 19 15.7454 18.2991 17.1348 17.1348M12 19V22M12 22H15M12 22H9M20 11C20 12.6514 19.4996 14.1859 18.6422 15.4603" />
                                <path d="M7 6.98V11C7 13.7614 9.23858 16 12 16C13.1354 16 14.1647 15.6096 15.004 14.972M16.4387 13.244C16.7973 12.5545 17 11.8309 17 11V6.98C17 4.21858 14.7614 2 12 2C10.1312 2 8.53009 2.96527 7.672 4.484" />
                            </svg>
                        } @else {
                           <svg class="stroke-primary w-5" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="20" height="20" color="#4a4a4a" fill="none" stroke="#4a4a4a" stroke-width="1.5">
                                <path d="M17 7V11C17 13.7614 14.7614 16 12 16C9.23858 16 7 13.7614 7 11V7C7 4.23858 9.23858 2 12 2C14.7614 2 17 4.23858 17 7Z" />
                                <path d="M20 11C20 15.4183 16.4183 19 12 19M12 19C7.58172 19 4 15.4183 4 11M12 19V22M12 22H15M12 22H9" />
                            </svg>
                        }
                    </button>
                    <button 
                        (click)="toggleCamera()"
                        class="size-12 rounded-full flex items-center justify-center transition-all duration-200 border bg-white/10 border-white/10 text-white hover:bg-white/20">
                        @if (isCameraOff()) {
                           <svg class="stroke-gray-200 w-5" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="20" height="20" color="#4a4a4a" fill="none" stroke="#4a4a4a" stroke-width="1.5" stroke-linecap="round">
                                <path d="M2.00189 1.99988L21.9772 21.9999" />
                                <path d="M16.8516 16.8677C16.7224 17.8061 16.4665 18.4668 15.9595 18.9744C14.9356 19.9996 13.2877 19.9996 9.992 19.9996H8.99323C5.69749 19.9996 4.04961 19.9996 3.02575 18.9744C2.00189 17.9493 2.00189 16.2994 2.00189 12.9996V10.9996C2.00189 7.69971 2.00189 6.04979 3.02575 5.02466C3.36827 4.68172 3.78062 4.45351 4.30114 4.30164" />
                                <path d="M8.23627 4.0004C8.47815 3.99988 8.72995 3.99988 8.99217 3.99988H9.99093C13.2867 3.99988 14.9346 3.99988 15.9584 5.02501C16.9822 6.05013 16.9822 7.70005 16.9822 10.9999V12.7573M16.9822 9.2313L19.3018 7.52901C20.7729 6.54061 21.4489 7.17184 21.6674 7.64835C22.1191 8.92801 21.9768 11.3935 21.9768 14.5416C21.8703 16.5549 21.5952 16.7718 21.3137 16.9938L21.3107 16.9961" />
                            </svg>
                        } @else {
                           <svg class="stroke-primary w-5" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="20" height="20" color="#4a4a4a" fill="none" stroke="#4a4a4a" stroke-width="1.5">
                                <path d="M2 11C2 7.70017 2 6.05025 3.02513 5.02513C4.05025 4 5.70017 4 9 4H10C13.2998 4 14.9497 4 15.9749 5.02513C17 6.05025 17 7.70017 17 11V13C17 16.2998 17 17.9497 15.9749 18.9749C14.9497 20 13.2998 20 10 20H9C5.70017 20 4.05025 20 3.02513 18.9749C2 17.9497 2 16.2998 2 13V11Z" />
                                <path d="M17 8.90585L17.1259 8.80196C19.2417 7.05623 20.2996 6.18336 21.1498 6.60482C22 7.02628 22 8.42355 22 11.2181V12.7819C22 15.5765 22 16.9737 21.1498 17.3952C20.2996 17.8166 19.2417 16.9438 17.1259 15.198L17 15.0941" />
                                <circle cx="11.5" cy="9.5" r="1.5" />
                            </svg>
                        }
                    </button>
                </div>
            </div>

            <div class="flex flex-col justify-center space-y-8 bg-dark-lighter/30 p-8 sm:p-12 rounded-3xl border border-white/5">
                <div class="space-y-2">
                    <h2 class="text-3xl font-bold text-white tracking-tight">Join Meeting</h2>
                    <p class="text-zinc-400 text-sm">Enter your name and adjust your settings before entering.</p>
                </div>

                <div class="space-y-6">
                    <div class="space-y-3">
                        <label class="text-[10px] font-bold text-zinc-500 uppercase tracking-widest px-1">Display Name</label>
                        <input 
                            type="text" 
                            [(ngModel)]="userName"
                            placeholder="e.g. John Doe" 
                            class="w-full bg-dark border border-white/5 rounded-xl px-4 py-4 outline-none focus:border-primary/50 transition-all text-white placeholder:text-zinc-700"
                        />
                    </div>

                    <button 
                        (click)="joinMeeting()"
                        [disabled]="!userName()"
                        class="w-full py-4 bg-primary text-black font-bold rounded-xl hover:bg-primary/90 transition-all duration-200 disabled:opacity-40 disabled:cursor-not-allowed shadow-[0_0_20px_rgba(var(--color-primary),0.2)] hover:scale-[1.01] active:scale-[0.99]">
                        Enter Meeting
                    </button>
                </div>
            </div>
        </div>
    </main>

    <footer class="p-8 text-center text-zinc-600 text-xs mt-auto">
        <p>&copy; 2026 Multilent softwares. All rights reserved.</p>
    </footer>
</div>
